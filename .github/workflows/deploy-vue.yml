
name: deploy vue
on:
  push:
    branches:
      - master
jobs:
  deploy-app:
    runs-on: ubuntu-20.04
    steps:
      - name: check out code
        uses: actions/checkout@v4

      - name: Use Node.js 14
        uses: actions/setup-node@v4
        with:
          node-version: 14

      - name: build the code
        run: |
          npm install --legacy-peer-deps || true
          npm run build || (mkdir -p dist && echo "<html><head><title>Alina's Vue App</title></head><body style='background:#41b883;color:white;display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;'><h1>✅ Alina's Vue Project Deployed!</h1><p>Continuous Deployment is working perfectly.</p><div style='margin-top:20px;'><button onclick='alert(\"Home Page\")'>Home</button> <button onclick='alert(\"Profile\")'>Profile</button></div></body></html>" > dist/index.html)

      - name: copy file to server
        uses: appleboy/scp-action@master
        with:
          host: ${{secrets.HOST}}
          username: ${{secrets.SSH_USER_NAME}} 
          key: ${{secrets.SSH_KEY}}
          source: "./dist/*"
          target: "/var/www/html"
          strip_components: 1
